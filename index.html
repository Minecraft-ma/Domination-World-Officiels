<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DOMINATION WORLD</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* ===== BACKGROUND PARTICLES ===== */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -2;
}

/* ===== HERO ===== */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.title {
  font-size: 80px;
  color: #00ffe1;
  text-shadow: 0 0 20px #00ffe1, 0 0 80px #00ffe1;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 10px #00ffe1); }
  to { filter: drop-shadow(0 0 30px #00ffe1); }
}

.subtitle {
  margin-top: 10px;
  color: #ffffffaa;
  font-size: 18px;
}

/* ===== BUTTONS ===== */
.buttons {
  margin-top: 40px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  padding: 15px 25px;
  border-radius: 12px;
  border: 1px solid #00ffe1;
  color: black;
  background: #00ffe1;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
  box-shadow: 0 0 20px #00ffe1;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 40px #00ffe1;
}

/* ===== IP BOX ===== */
.ip {
  margin-top: 20px;
  font-size: 22px;
  color: #ffcc00;
  cursor: pointer;
  padding: 10px 20px;
  border: 1px solid #ffcc00;
  border-radius: 10px;
  transition: 0.3s;
}

.ip:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ffcc00;
}

/* ===== GLITCH EFFECT ===== */
.glitch {
  position: relative;
}

.glitch::before,
.glitch::after {
  content: "DOMINATION WORLD";
  position: absolute;
  left: 0;
  width: 100%;
  overflow: hidden;
}

.glitch::before {
  color: #ff00ff;
  animation: glitch 0.3s infinite;
}

.glitch::after {
  color: #00ffff;
  animation: glitch 0.3s infinite reverse;
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(-2px, -2px); }
  60% { transform: translate(2px, 2px); }
  80% { transform: translate(2px, -2px); }
  100% { transform: translate(0); }
}

/* ===== FADE IN ===== */
.hero * {
  animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

footer {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  color: #ffffff33;
  font-size: 12px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="hero">

  <div class="glitch title">DOMINATION WORLD</div>

  <div class="subtitle">
    Le serveur Minecraft ultime — PvP • Survival • Events
  </div>

  <div class="ip" onclick="copyIP()">
    mc.hosteria-ddy.com:21502
  </div>

  <div class="buttons">

    <a class="btn" href="https://www.clictune.com/mHUW" target="_blank">
      📦 Télécharger
    </a>

    <a class="btn" href="#">
      ⚔ Rejoindre maintenant
    </a>

  </div>

</div>

<footer>
© DOMINATION WORLD - Built for legends
</footer>

<script>
function copyIP() {
  navigator.clipboard.writeText("mc.hosteria-ddy.com:21502");
  alert("🔥 IP copiée !");
}

/* ===== PARTICLES SYSTEM ===== */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    dx: (Math.random() - 0.5),
    dy: (Math.random() - 0.5)
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ffe1";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
