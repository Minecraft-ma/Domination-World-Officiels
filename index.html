<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DOMINATION WORLD</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1a2e, #000);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      padding: 80px 20px;
    }

    h1 {
      font-size: 60px;
      letter-spacing: 4px;
      color: #00ffe1;
      text-shadow: 0 0 20px #00ffe1, 0 0 40px #00ffe1;
      margin-bottom: 10px;
    }

    h2 {
      color: #ffffffaa;
      margin-bottom: 40px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,255,225,0.3);
      border-radius: 15px;
      padding: 30px;
      max-width: 500px;
      margin: 20px auto;
      box-shadow: 0 0 20px rgba(0,255,225,0.2);
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 25px;
      border-radius: 10px;
      background: #00ffe1;
      color: black;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00ffe1;
    }

    .ip {
      font-size: 22px;
      margin-top: 10px;
      color: #ffcc00;
    }

    footer {
      margin-top: 60px;
      color: #ffffff55;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>DOMINATION WORLD</h1>
    <h2>Rejoins l'aventure ultime Minecraft</h2>

    <div class="card">
      <h3>📦 Téléchargement</h3>
      <p>Récupère le pack / fichier du serveur ici :</p>
      <a class="btn" href="https://www.mediafire.com/" target="_blank">
        Télécharger
      </a>
    </div>

    <div class="card">
      <h3>🔥 Serveur Minecraft</h3>
      <p>Connecte-toi maintenant :</p>
      <div class="ip">mc.hosteria-ddy.com:21502</div>
      <p>Version recommandée : 1.8 - 1.20+</p>
    </div>

    <footer>
      © DOMINATION WORLD - Tous droits réservés
    </footer>
  </div>

</body>
</html>
